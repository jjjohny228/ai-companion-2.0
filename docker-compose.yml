services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adult-chat-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/bot.sqlite3
      ASSETS_DIR: /app/assets/avatars
    volumes:
      - bot_data:/app/data
      - bot_assets:/app/assets

volumes:
  bot_data:
  bot_assets:
